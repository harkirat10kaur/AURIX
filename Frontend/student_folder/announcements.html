<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Announcements | AURIX</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../CSS/style.css">
    <script src="https://kit.fontawesome.com/64d58efce2.js"></script>
</head>

<body class="dashboard-page">

<!-- 🔐 AUTH -->
<script>
const user = JSON.parse(localStorage.getItem("user"));
if (!user) {
    window.location.href = "../login.html";
}
</script>

<!-- BACKGROUND -->
<div id="particles-js"></div>

<!-- TOPBAR -->
<header class="topbar">
    <div class="nav-left">
        <i class="fas fa-bars menu-icon" onclick="toggleSidebar()"></i>
        <h2 class="logo">AURIX</h2>
    </div>

    <div class="menu">
        <a href="student-dashboard.html" class="nav-btn" onclick="handleNav(event, this)">Home</a>
        <a href="my-events.html" class="nav-btn" onclick="handleNav(event, this)">My Events</a>
        <a href="club-page.html" class="nav-btn" onclick="handleNav(event, this)">Clubs</a>
        <a href="announcements.html" class="active">Announcements</a>
    </div>

    <div class="right">
        <h3 id="welcomeUser"></h3>
        <input type="text" placeholder="Search..." class="search-bar">
        <i class="fas fa-user-circle profile-icon" onclick="toggleSidebar()"></i>
    </div>
</header>

<!-- MAIN -->
<div class="main-content">

    <h2 class="section-title">📢 Campus Announcements</h2>

    <div class="event-grid" id="announcementsContainer">
        <!-- Announcements loaded here dynamically -->
    </div>

</div>

<!-- FOOTER -->
<footer class="footer">
    <div class="footer-container">
        <div>
            <h2>AURIX</h2>
            <p>Smart College Event Platform</p>
        </div>
        <div>
            <h4>Explore</h4>
            <p>Home</p>
            <p>Events</p>
            <p>Clubs</p>
        </div>
        <div>
            <h4>Contact</h4>
            <p>aurix@college.com</p>
            <p>+91 9876543210</p>
        </div>
    </div>
    <div class="footer-bottom">
        © 2026 AURIX • All rights reserved
    </div>
</footer>

<!-- SCRIPTS -->
<script src="https://cdn.jsdelivr.net/npm/particles.js"></script>
<script src="../JS/app.js"></script>

<!-- USER NAME -->
<script>
document.getElementById("welcomeUser").innerText = "👋 " + user.name;
</script>

<script>
const token = localStorage.getItem("token");

async function loadAnnouncements() {
    try {
        const res = await fetch("http://localhost:5000/api/announcements");
        const announcements = await res.json();
        
        const container = document.getElementById("announcementsContainer");
        container.innerHTML = "";

        if (announcements.length === 0) {
            container.innerHTML = `
                <div style="padding: 40px; text-align: center; width: 100%;">
                    <h3>No Announcements Yet 🔔</h3>
                    <p>Stay tuned for exciting club updates!</p>
                </div>
            `;
            return;
        }

        announcements.forEach(ann => {
            const date = new Date(ann.created_at).toLocaleString();
            container.innerHTML += `
                <div class="event-card" style="width: 320px;">
                    <div class="card-content">
                        <span class="live-badge" style="background: linear-gradient(135deg, #6366f1, #8b5cf6); padding: 5px 10px; border-radius: 5px; font-size: 11px;">
                            ${ann.club_name}
                        </span>
                        <h3 style="margin-top: 15px; font-size: 20px;">${ann.title}</h3>
                        <p style="font-size: 12px; opacity: 0.6; margin-bottom: 12px;">Published on ${date}</p>
                        <p class="desc" style="white-space: pre-wrap; font-size: 14px; line-height: 1.5; color: #cbd5f5;">${ann.content}</p>
                    </div>
                </div>
            `;
        });
    } catch (err) {
        console.error("Error loading announcements:", err);
    }
}

loadAnnouncements();
</script>

</body>
</html>
